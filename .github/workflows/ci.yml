name: CI

on:
  push:
    branches: [main, master, "fix/**", "feat/**"]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system deps (poppler, tesseract)
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils tesseract-ocr libglib2.0-0

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Compile check (syntax)
        run: python -m compileall app.py

      - name: Run pytest
        run: pytest -q --maxfail=1 --disable-warnings

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image (sanity)
        run: docker build -t contract-importer:ci .
